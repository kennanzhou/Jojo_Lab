# Jojo LAB — https://lab.jojo1222.com (HTTPS terminated at Cloudflare)
# Scoped to lab.jojo1222.com only; does not change cynadu.ai or other vhosts.

map $sent_http_content_type $jojo_asset_cache {
    default                                 "public, max-age=31536000, immutable";
    "~*text/html"                           "no-cache";
    "~*application/json"                    "no-store";
}

server {
    listen 80;
    listen [::]:80;
    server_name lab.jojo1222.com;

    client_max_body_size 32m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    location /assets/ {
        proxy_pass http://127.0.0.1:4173;
        include /opt/jojo-lab/deploy/jojo-lab.proxy.conf;
        proxy_hide_header Cache-Control;
        add_header Cache-Control $jojo_asset_cache always;
    }

    location ~* ^/(app\.js|styles\.css)$ {
        proxy_pass http://127.0.0.1:4173;
        include /opt/jojo-lab/deploy/jojo-lab.proxy.conf;
        proxy_hide_header Cache-Control;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4173;
        include /opt/jojo-lab/deploy/jojo-lab.proxy.conf;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        add_header Cache-Control "no-store" always;
    }

    location / {
        proxy_pass http://127.0.0.1:4173;
        include /opt/jojo-lab/deploy/jojo-lab.proxy.conf;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
